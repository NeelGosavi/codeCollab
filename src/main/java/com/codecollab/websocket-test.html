<!DOCTYPE html>
<html>
<head>
    <title>CodeCollab - Real-time Collaboration</title>
    <style>
        body { font-family: 'Courier New', monospace; padding: 20px; background: #1e1e1e; color: #d4d4d4; }
        .container { max-width: 1200px; margin: 0 auto; }
        textarea { 
            width: 100%; 
            height: 500px; 
            font-family: 'Courier New', monospace; 
            font-size: 14px;
            background: #1e1e1e;
            color: #d4d4d4;
            border: 1px solid #3c3c3c;
            padding: 10px;
            resize: vertical;
        }
        button { margin: 5px; padding: 10px 20px; cursor: pointer; background: #0e639c; color: white; border: none; border-radius: 4px; }
        button:hover { background: #1177bb; }
        .status { padding: 10px; border-radius: 5px; margin: 10px 0; }
        .connected { background: #0e639c; color: white; }
        .disconnected { background: #8b0000; color: white; }
        input { padding: 8px; margin: 5px; background: #3c3c3c; color: white; border: 1px solid #555; }
        .messages { border: 1px solid #3c3c3c; height: 150px; overflow-y: auto; padding: 10px; margin-top: 10px; background: #252526; font-size: 12px; }
        .participants { border: 1px solid #3c3c3c; padding: 10px; margin-top: 10px; background: #252526; }
        .participant { display: inline-block; background: #0e639c; padding: 5px 10px; margin: 2px; border-radius: 15px; font-size: 12px; }
        .typing-indicator { color: #0e639c; font-style: italic; margin-top: 5px; }
        h1, h3 { color: #0e639c; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>🚀 CodeCollab - Real-time Collaboration</h1>
        
        <div>
            <input type="text" id="roomId" placeholder="Room ID" value="TEST123" size="20">
            <input type="text" id="userEmail" placeholder="Your Email" value="alice@test.com" size="30">
            <input type="text" id="username" placeholder="Your Name" value="Alice" size="20">
            <button onclick="connect()">🔌 Connect</button>
            <button onclick="disconnect()">❌ Disconnect</button>
        </div>
        
        <div id="status" class="status disconnected">⚫ Disconnected</div>
        
        <div class="participants" id="participants">
            <strong>👥 Participants:</strong> <span id="participantList">None</span>
            <div id="typingIndicator" class="typing-indicator"></div>
        </div>
        
        <h3>📝 Real-time Code Editor (Type anywhere - others see instantly!)</h3>
        <textarea id="codeEditor" placeholder="Start typing... Your changes appear to everyone in real-time!"></textarea>
        
        <div id="messages" class="messages"></div>
    </div>

    <script>
        let stompClient = null;
        let typingTimeout = null;
        let currentRoomId = null;
        let currentUserEmail = null;
        let currentUsername = null;
        let isTyping = false;
        
        function addMessage(msg, type = 'info') {
            const div = document.getElementById('messages');
            const time = new Date().toLocaleTimeString();
            div.innerHTML += `<div><strong>[${time}]</strong> ${msg}</div>`;
            div.scrollTop = div.scrollHeight;
            
            // Auto clear old messages (keep last 50)
            if (div.children.length > 50) {
                div.removeChild(div.children[0]);
            }
        }
        
        function updateParticipants(participants) {
            const container = document.getElementById('participantList');
            if (!participants || participants.length === 0) {
                container.innerHTML = 'None';
                return;
            }
            container.innerHTML = participants.map(p => `<span class="participant">${p}</span>`).join('');
        }
        
        function sendTypingIndicator() {
            if (!stompClient || !stompClient.connected) return;
            
            if (!isTyping) {
                isTyping = true;
                stompClient.send('/app/typing.start', {}, JSON.stringify({
                    roomId: currentRoomId,
                    senderEmail: currentUserEmail,
                    username: currentUsername,
                    typing: true
                }));
            }
            
            // Clear existing timeout
            if (typingTimeout) clearTimeout(typingTimeout);
            
            // Set timeout to stop typing indicator after 2 seconds of no typing
            typingTimeout = setTimeout(() => {
                if (stompClient && stompClient.connected) {
                    isTyping = false;
                    stompClient.send('/app/typing.stop', {}, JSON.stringify({
                        roomId: currentRoomId,
                        senderEmail: currentUserEmail,
                        username: currentUsername,
                        typing: false
                    }));
                }
            }, 2000);
        }
        
        function connect() {
            currentRoomId = document.getElementById('roomId').value;
            currentUserEmail = document.getElementById('userEmail').value;
            currentUsername = document.getElementById('username').value;
            
            if (!currentRoomId || !currentUserEmail) {
                addMessage('❌ Please enter Room ID and Email');
                return;
            }
            
            addMessage('🔌 Connecting to WebSocket...');
            
            const socket = new SockJS('http://localhost:8080/ws');
            stompClient = Stomp.over(socket);
            
            stompClient.connect({}, 
                function(frame) {
                    addMessage('✅ Connected to WebSocket!');
                    document.getElementById('status').className = 'status connected';
                    document.getElementById('status').innerHTML = '✅ Connected to room: ' + currentRoomId;
                    
                    // Subscribe to code updates
                    stompClient.subscribe('/topic/room/' + currentRoomId + '/code', function(msg) {
                        const data = JSON.parse(msg.body);
                        const editor = document.getElementById('codeEditor');
                        const currentCursorPos = editor.selectionStart;
                        
                        // Only update if the message is from someone else
                        if (data.senderEmail !== currentUserEmail) {
                            editor.value = data.codeContent;
                            // Restore cursor position
                            editor.selectionStart = currentCursorPos;
                            editor.selectionEnd = currentCursorPos;
                            addMessage(`📝 Code updated by ${data.senderEmail}`);
                        }
                    });
                    
                    // Subscribe to typing indicators
                    stompClient.subscribe('/topic/room/' + currentRoomId + '/typing', function(msg) {
                        const data = JSON.parse(msg.body);
                        const indicator = document.getElementById('typingIndicator');
                        if (data.senderEmail !== currentUserEmail) {
                            if (data.typing) {
                                indicator.innerHTML = `⌨️ ${data.username || data.senderEmail} is typing...`;
                            } else {
                                indicator.innerHTML = '';
                            }
                        }
                    });
                    
                    // Subscribe to participant updates
                    stompClient.subscribe('/topic/room/' + currentRoomId + '/participants', function(msg) {
                        const data = JSON.parse(msg.body);
                        updateParticipants(data.participants);
                        addMessage(`👥 ${data.participantName || data.participantEmail} ${data.eventType}ED the room (Total: ${data.participantCount})`);
                    });
                    
                    // Send join event
                    stompClient.send('/app/room.join', {}, JSON.stringify({
                        roomId: currentRoomId,
                        eventType: 'JOIN',
                        participantEmail: currentUserEmail,
                        participantName: currentUsername
                    }));
                    
                    addMessage(`✅ Joined room: ${currentRoomId}`);
                    
                    // Setup real-time editor listener
                    const editor = document.getElementById('codeEditor');
                    editor.disabled = false;
                    editor.value = ''; // Clear editor
                    
                    // Remove old listener and add new one
                    editor.removeEventListener('input', handleEditorInput);
                    editor.addEventListener('input', handleEditorInput);
                },
                function(error) {
                    addMessage(`❌ Connection failed: ${error}`);
                    document.getElementById('status').className = 'status disconnected';
                    document.getElementById('status').innerHTML = '❌ Disconnected';
                }
            );
        }
        
        // This function handles real-time code updates as you type!
        function handleEditorInput(event) {
            if (!stompClient || !stompClient.connected) return;
            
            const code = event.target.value;
            
            // Send typing indicator
            sendTypingIndicator();
            
            // Send code update in real-time (debounced to avoid flooding)
            if (window.codeUpdateTimeout) clearTimeout(window.codeUpdateTimeout);
            
            window.codeUpdateTimeout = setTimeout(() => {
                stompClient.send('/app/code.update', {}, JSON.stringify({
                    roomId: currentRoomId,
                    codeContent: code,
                    senderEmail: currentUserEmail
                }));
            }, 100); // Wait 100ms after typing stops to send update
        }
        
        function disconnect() {
            if (stompClient) {
                stompClient.send('/app/room.leave', {}, JSON.stringify({
                    roomId: currentRoomId,
                    eventType: 'LEAVE',
                    participantEmail: currentUserEmail,
                    participantName: currentUsername
                }));
                
                stompClient.disconnect();
                document.getElementById('status').className = 'status disconnected';
                document.getElementById('status').innerHTML = '❌ Disconnected';
                document.getElementById('codeEditor').disabled = true;
                document.getElementById('participantList').innerHTML = 'None';
                addMessage('🔌 Disconnected from WebSocket');
            }
        }
        
        // Cleanup on page close
        window.addEventListener('beforeunload', function() {
            if (stompClient && stompClient.connected) {
                stompClient.send('/app/room.leave', {}, JSON.stringify({
                    roomId: currentRoomId,
                    eventType: 'LEAVE',
                    participantEmail: currentUserEmail,
                    participantName: currentUsername
                }));
            }
        });
    </script>
</body>
</html>
